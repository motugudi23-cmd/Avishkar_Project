<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AI Traffic Violation System</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #eef2f3; text-align: center; padding: 40px; }
        .card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); display: inline-block; width: 400px; }
        select, input, button { width: 100%; padding: 12px; margin: 10px 0; border-radius: 5px; border: 1px solid #ccc; box-sizing: border-box; }
        button { background-color: #2c3e50; color: white; border: none; cursor: pointer; font-weight: bold; }
        button:hover { background-color: #34495e; }
        #result { margin-top: 20px; padding: 15px; border-top: 2px solid #eee; text-align: left; }
    </style>
</head>
<body>

<div class="card">
    <h2>🚦 Traffic AI Assistant</h2>
    <p>Upload a photo to check for violations.</p>
    
    <input type="file" id="imageFile" accept="image/*">
    
    <select id="langChoice">
        <option value="en">English</option>
        <option value="hi">Hindi (हिन्दी)</option>
        <option value="kn">Kannada (ಕನ್ನಡ)</option>
        <option value="ar">Arabic (العربية)</option>
    </select>
    
    <button onclick="processDetection()">Analyze Violation</button>

    <div id="result" style="display:none;">
        <strong>Violation:</strong> <span id="vText"></span><br>
        <strong>Fine Amount:</strong> <span id="vFine"></span><br><br>
        <audio id="vVoice" controls></audio>
    </div>
</div>

<script>
    function processDetection() {
        const fileInput = document.getElementById('imageFile');
        const lang = document.getElementById('langChoice').value;
        
        if (fileInput.files.length === 0) {
            alert("Please select a photo first!");
            return;
        }

        const formData = new FormData();
        formData.append('image', fileInput.files[0]);
        formData.append('language', lang);

        fetch('/detect', { method: 'POST', body: formData })
        .then(res => res.json())
        .then(data => {
            document.getElementById('result').style.display = "block";
            document.getElementById('vText').innerText = data.violation;
            document.getElementById('vFine').innerText = data.fine;
            
            const audio = document.getElementById('vVoice');
            audio.src = data.audio_url + "?t=" + new Date().getTime(); // Refresh audio
            audio.play();
        });
    }
</script>

</body>
</html>
